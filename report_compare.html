<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>종합 비교 · ElectionAI</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
.ranking-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 16px; }
.rank-card {
  background: white; border-radius: var(--radius); padding: 20px;
  border: 2px solid var(--border); box-shadow: var(--shadow);
  position: relative; overflow: hidden; transition: transform 0.2s;
}
.rank-card:hover { transform: translateY(-2px); }
.rank-card .rank-num {
  font-size: 48px; font-weight: 900; opacity: 0.06;
  position: absolute; right: 12px; top: 4px; line-height:1;
}
.rank-card .candidate-name { font-size: 18px; font-weight: 800; margin-bottom: 2px; }
.rank-card .candidate-party { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
.rank-card .total-score { font-size: 36px; font-weight: 900; }
.rank-card .grade-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700;
  margin-left: 8px; vertical-align: middle;
}
.rank-card .rank-position { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.top-bar {
  background: linear-gradient(90deg, var(--primary-dark), var(--primary));
  color: white; padding: 4px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 600; display: inline-block; margin-bottom: 8px;
}
.grade-legend {
  display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
  margin-bottom: 16px; padding: 10px 14px;
  background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;
}
.grade-legend-label { font-size: 12px; font-weight: 700; color: #374151; }
.grade-legend-item {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 14px; font-size: 12px; font-weight: 700;
}

@media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-logo">⚖️ Election<span class="logo-analysis">Analysis</span><span class="logo-report">Report</span><span class="logo-ai">AI</span></div>
    <div class="header-subtitle">AI 기반 선거 후보자 비교 분석 플랫폼</div>
    <div class="header-date" id="header-date"></div>
  </div>
</header>
<nav class="main-nav"><div class="nav-inner" id="main-nav"></div></nav>

<div class="page-container">
  <div class="page-title">
    <h1>📊 01. 종합 비교분석</h1>
    <p>4개 AI 모델 평균 점수 기반 후보자 종합 평가 결과</p>
  </div>
  <div id="page-content"></div>
</div>

<button class="print-btn" onclick="window.open('report_full.html','_blank')" title="전체 PDF 보고서">📥</button>

<script src="js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const data = requireData();
  if (!data) return;

  const { candidates } = data;
  const totalRanks = calcTotalRankings(candidates);
  const metricRanks = calcMetricRankings(candidates);
  const n = candidates.length;

  let html = '';

  // ── 순위 카드 ──
  html += `<div class="card"><div class="card-title">🏆 종합 순위</div>
  <div class="grade-legend">
    <span class="grade-legend-label">📊 등급 기준:</span>
    <span class="grade-legend-item" style="background:#ede9fe;color:#5b21b6">S 최우수 · 880점 이상</span>
    <span class="grade-legend-item" style="background:#dcfce7;color:#166534">A 우수 · 840점 이상</span>
    <span class="grade-legend-item" style="background:#dbeafe;color:#1e40af">B 양호 · 760점 이상</span>
    <span class="grade-legend-item" style="background:#fef3c7;color:#92400e">C 보통 · 680점 이상</span>
    <span class="grade-legend-item" style="background:#fee2e2;color:#991b1b">D 미흡 · 680점 미만</span>
  </div>
  <div class="ranking-grid">`;
  const sorted = [...candidates].map((c,i) => ({...c, idx:i})).sort((a,b)=>b.total_score-a.total_score);
  sorted.forEach((c, rank) => {
    const col = CANDIDATE_COLORS[c.idx % 5];
    const g = scoreGrade(c.total_score);
    html += `
      <div class="rank-card" style="border-color:${col.border}">
        <div class="rank-num">${rank+1}</div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <div class="rank-tag ${rank===0?'rank-1':rank===1?'rank-2':rank===2?'rank-3':'rank-other'}">${rank+1}</div>
          <div>
            <div class="candidate-name" style="color:${col.border}">${c.name}</div>
            <div class="candidate-party">${c.party}</div>
          </div>
        </div>
        <div>
          <span class="total-score" style="color:${col.border}">${c.total_score}</span>
          <span style="font-size:14px;color:var(--text-muted)">점</span>
          <span class="grade-badge" style="background:${col.light};color:${col.text}">${g.label}등급 · ${g.desc}</span>
        </div>
        <div class="rank-position">${c.position || ''}</div>
        <div class="progress-bar" style="margin-top:10px">
          <div class="progress-fill" style="width:${(c.total_score/1000)*100}%;background:${col.border}"></div>
        </div>
      </div>`;
  });
  html += `</div>`;
  // ── 종합 순위 종합 설명 ──
  {
    const avgScore = Math.round(sorted.reduce((a,c)=>a+c.total_score,0)/n);
    const top = sorted[0]; const btm = sorted[n-1];
    const gap12 = n>1 ? top.total_score - sorted[1].total_score : 0;
    const spread = top.total_score - btm.total_score;
    const gradeTop = scoreGrade(top.total_score);
    html += summaryBox('종합 순위 분석 종합 설명', [
      `이번 분석에서 <strong>${top.name}</strong>(${top.party})이(가) 종합 <strong>${top.total_score}점</strong>으로 1위를 기록했습니다. 등급은 <strong>${gradeTop.label}등급(${gradeTop.desc})</strong>으로 평가되었으며, 4개 AI 모델 — Claude, ChatGPT, Gemini, Grok — 의 평균 점수를 종합한 결과입니다. 전체 후보의 평균 점수는 <strong>${avgScore}점</strong>이며, 1위와 최하위 후보 간 점수 격차는 <strong>${spread}점</strong>입니다.`,
      `2위${n>1?' '+sorted[1].name:''}와의 점수 차이는 <strong>${gap12}점</strong>으로, ${gap12 <= 10 ? '매우 경쟁적인 구도임을 확인할 수 있습니다. 소수점 단위의 평가 차이가 순위를 결정하는 박빙의 경쟁이 펼쳐지고 있어, 특정 항목에서의 단기적 개선이 전체 순위를 바꿀 수 있는 구조입니다.' : gap12 <= 30 ? '일정한 차이를 보이고 있습니다. 상위권 경쟁은 여전히 치열하며, 2~3개 항목의 개선으로 순위 변동이 가능한 수준입니다.' : '비교적 뚜렷한 격차를 형성하고 있습니다. 1위 후보가 다수 항목에서 안정적 우위를 확보했음을 의미하며, 하위 후보들은 전략적 차별화가 필요합니다.'}`,
      `본 순위는 공익성·전문성·책임성·청렴성 등 유권자가 정치인을 평가하는 핵심 10개 역량을 AI가 공개 문서 및 보도 자료 기반으로 분석한 결과입니다. 지지율 여론조사와 달리 감정·이미지 편향 없이 <strong>성과 및 공약 이행 데이터</strong>에 근거한 객관적 평가라는 점에서 차별화됩니다.`,
      `종합 순위만으로 후보의 역량을 단정 짓는 것은 한계가 있습니다. 각 항목별 점수와 강점·약점 분포를 함께 분석하면 보다 입체적인 후보 평가가 가능합니다. 하단의 레이더 차트 및 항목별 상세 분석 페이지를 통해 각 후보의 세부 역량 프로파일을 확인하시기 바랍니다.`
    ]);
  }
  html += `</div>`;

  // ── 차트 2개 ──
  html += `<div class="charts-grid">`;

  // 레이더 차트
  html += `<div class="card"><div class="card-title">🕸️ 10개 항목 레이더 비교</div>
    <div class="chart-container" style="height:360px">
      <canvas id="radarChart"></canvas>
    </div></div>`;

  // 막대 차트
  html += `<div class="card"><div class="card-title">📊 종합 점수 비교</div>
    <div class="chart-container" style="height:360px">
      <canvas id="barChart"></canvas>
    </div></div>`;

  html += `</div>`;
  // ── 레이더/막대 차트 종합 설명 ──
  {
    const top = sorted[0];
    const topMetrics = METRICS.map(m=>({m, s:top.metrics?.[m]??0})).sort((a,b)=>b.s-a.s).slice(0,3);
    const avgScore = Math.round(sorted.reduce((a,c)=>a+c.total_score,0)/n);
    html += summaryBox('비교 차트 종합 설명', [
      `레이더 차트는 10개 평가 항목에 대한 각 후보의 역량을 동시에 시각화합니다. 차트에서 면적이 넓고 균형 잡힌 다각형을 그리는 후보일수록 전 분야에 걸쳐 고른 역량을 보유하고 있습니다. <strong>${top.name}</strong>의 레이더는 특히 <strong>${topMetrics.map(x=>METRIC_LABELS[x.m]).join(', ')}</strong> 항목에서 외곽으로 뻗어 있어 해당 역량이 두드러집니다.`,
      `종합 점수 막대 그래프에서는 후보 간 절대적 점수 차이를 한눈에 파악할 수 있습니다. 전체 평균 점수는 <strong>${avgScore}점</strong>이며, 600점~1,000점 척도 중 ${avgScore >= 800 ? '상위권' : avgScore >= 700 ? '중상위권' : '중위권'}에 분포하고 있습니다. 점수 분포의 밀집도가 높을수록 후보들 간의 실질적 역량 차이가 작음을 의미합니다.`,
      `두 차트를 함께 해석할 때 중요한 점은, 종합 점수가 높더라도 특정 항목에 편중된 후보는 레이더 차트에서 비대칭 형태를 보인다는 것입니다. 반면 종합 점수가 다소 낮아도 레이더가 균형 잡힌 후보는 안정적인 전방위 역량을 갖추고 있다고 볼 수 있습니다.`,
      `유권자 입장에서는 레이더의 면적(종합 역량)과 균형성(항목 간 편차)을 함께 고려해야 하며, 자신이 중요하게 여기는 항목 — 예컨대 청렴성·공익성·정책실행력 — 에서 두드러지는 후보를 별도로 확인하는 것이 바람직합니다.`
    ]);
  }

  // ── 항목별 우위 분석 ──
  html += `<div class="card"><div class="card-title">🎯 항목별 최고 점수 후보</div>
    <div class="table-wrap"><table>
      <thead><tr><th>평가 항목</th>`;
  sorted.forEach(c => { html += `<th style="color:${CANDIDATE_COLORS[c.idx%5].border}">${c.name}</th>`; });
  html += `<th>최고 점수</th></tr></thead><tbody>`;

  METRICS.forEach(m => {
    const scores = candidates.map((c,i) => ({ idx:i, name:c.name, score: c.metrics?.[m] ?? 0 }));
    const maxScore = Math.max(...scores.map(s=>s.score));
    html += `<tr><td><strong>${METRIC_LABELS[m]}</strong></td>`;
    sorted.forEach(c => {
      const sc = c.metrics?.[m] ?? 0;
      const isMax = sc === maxScore;
      html += `<td style="${isMax?`background:${CANDIDATE_COLORS[c.idx%5].light};font-weight:700;color:${CANDIDATE_COLORS[c.idx%5].text}`:''}">${sc}${isMax?' ★':''}</td>`;
    });
    const winner = scores.find(s=>s.score===maxScore);
    html += `<td><strong>${winner.name} (${maxScore})</strong></td></tr>`;
  });
  html += `</tbody></table></div></div>`;

  // ── 항목별 최고 점수 종합 설명 ──
  {
    const metricWinCounts = {};
    candidates.forEach((c,i) => { metricWinCounts[i] = 0; });
    METRICS.forEach(m => {
      const scores = candidates.map((c,i)=>({i, s: c.metrics?.[m]??0}));
      const max = Math.max(...scores.map(x=>x.s));
      scores.filter(x=>x.s===max).forEach(x=>{ metricWinCounts[x.i]++; });
    });
    const topWinner = Object.entries(metricWinCounts).sort((a,b)=>b[1]-a[1])[0];
    const topWinnerName = candidates[topWinner[0]].name;
    const topWinCount = topWinner[1];
    const contestedMetric = METRICS.reduce((best,m) => {
      const scores = candidates.map(c=>c.metrics?.[m]??0);
      const gap = Math.max(...scores) - Math.min(...scores);
      return (!best || gap < best.gap) ? {m, gap} : best;
    }, null);
    const dominantMetric = METRICS.reduce((best,m) => {
      const scores = candidates.map(c=>c.metrics?.[m]??0);
      const gap = Math.max(...scores) - Math.min(...scores);
      return (!best || gap > best.gap) ? {m, gap} : best;
    }, null);
    html += summaryBox('항목별 최고 점수 후보 종합 설명', [
      `10개 평가 항목별 최고 점수 분석에서 <strong>${topWinnerName}</strong>이(가) 총 <strong>${topWinCount}개 항목</strong>에서 1위를 차지하며 가장 넓은 영역에서 우위를 보였습니다. 이는 단순 종합 점수 순위와 더불어, 해당 후보의 역량이 특정 분야에 집중되지 않고 광범위하게 분포한다는 것을 의미합니다.`,
      `가장 치열하게 경쟁하는 항목은 <strong>${METRIC_LABELS[contestedMetric.m]}</strong>(후보 간 최대 격차 ${contestedMetric.gap}점)으로, 어느 후보도 압도적 우위를 점하지 못한 '격전지' 항목입니다. 반면 <strong>${METRIC_LABELS[dominantMetric.m]}</strong> 항목은 격차가 ${dominantMetric.gap}점으로 특정 후보가 독보적 우위를 보이는 '차별화 항목'입니다.`,
      `항목별 최고 점수를 확보한 후보 수가 분산되어 있을수록 선거 경쟁의 복잡성이 높아집니다. 한 후보가 모든 항목을 석권할 때와 여러 후보가 서로 다른 항목에서 1위를 나눠 가질 때는 유권자의 선택 기준이 달라집니다. 전자는 명확한 리더가 있는 구조이고, 후자는 유권자 개인의 가치관이 투표 결과를 결정하는 구조입니다.`,
      `이 분석은 각 후보의 '핵심 강점 항목'을 파악하고 선거 전략을 수립하는 데 직접적으로 활용됩니다. 유권자 입장에서는 자신이 중요하게 여기는 항목에서 1위를 차지한 후보를 확인하는 것이 후보 선택의 근거가 될 수 있습니다.`
    ]);
  }

  // ── 인사이트 ──
  const top = sorted[0];
  const topColor = CANDIDATE_COLORS[top.idx%5];
  html += `<div class="card">
    <div class="card-title">💡 핵심 인사이트</div>
    <div class="insight-box">
      <strong style="color:${topColor.border}">${top.name}</strong>이(가) 종합 ${top.total_score}점으로 1위를 기록했습니다.
      ${n > 1 ? `2위 ${sorted[1].name}(${sorted[1].total_score}점)과의 격차는 <strong>${top.total_score - sorted[1].total_score}점</strong>입니다.` : ''}
      ${n > 1 ? `<br>2~${n}위 후보는 ${sorted[n-1].total_score}~${sorted[1].total_score}점 범위에 분포하며, 격차는 ${sorted[1].total_score - sorted[n-1].total_score}점입니다.` : ''}
    </div>
  </div>`;

  document.getElementById('page-content').innerHTML = html;

  // ── 레이더 차트 ──
  new Chart(document.getElementById('radarChart'), {
    type: 'radar',
    data: {
      labels: METRICS.map(m => METRIC_LABELS[m]),
      datasets: candidates.map((c,i) => ({
        label: c.name,
        data: METRICS.map(m => c.metrics?.[m] ?? 0),
        borderColor: CANDIDATE_COLORS[i%5].border,
        backgroundColor: CANDIDATE_COLORS[i%5].bg,
        borderWidth: 2,
        pointRadius: 4,
        pointBackgroundColor: CANDIDATE_COLORS[i%5].border,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        r: {
          min: 50, max: 100, ticks: { stepSize: 10, font: { size: 10 } },
          pointLabels: { font: { size: 12, weight: '600' } },
          grid: { color: '#e2e8f0' }
        }
      },
      plugins: { legend: { position: 'bottom', labels: { font: { size: 12 }, padding: 16 } } }
    }
  });

  // ── 막대 차트 ──
  new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: candidates.map(c => c.name),
      datasets: [{
        label: '종합 점수',
        data: candidates.map(c => c.total_score),
        backgroundColor: candidates.map((c,i) => CANDIDATE_COLORS[i%5].bg),
        borderColor: candidates.map((c,i) => CANDIDATE_COLORS[i%5].border),
        borderWidth: 2,
        borderRadius: 8,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      scales: {
        x: { min: 600, max: 1000, grid: { color: '#f1f5f9' }, ticks: { font: { size: 12 } } },
        y: { ticks: { font: { size: 13, weight: '600' } } }
      },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.x}점` } }
      }
    }
  });
});
</script>
</body>
</html>
