<svg xmlns="http://www.w3.org/2000/svg" width="900" height="720" viewBox="0 0 900 720" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <style>
      .title { font-size: 20px; font-weight: bold; fill: #1e293b; }
      .label { font-size: 13px; fill: #1e293b; }
      .label-small { font-size: 11px; fill: #475569; }
      .label-white { font-size: 13px; fill: #ffffff; font-weight: bold; }
      .desc { font-size: 11px; fill: #64748b; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" class="title">선거 후보자 비교 분석 플랫폼 — 구조도</text>
  <text x="450" y="58" text-anchor="middle" class="desc">서버 없는 로컬 HTML 파일 세트 | LocalStorage 기반 데이터 공유</text>

  <!-- ===== 사용자 진입점 ===== -->
  <rect x="355" y="78" width="190" height="46" rx="8" fill="#3b82f6"/>
  <text x="450" y="97" text-anchor="middle" class="label-white">index.html</text>
  <text x="450" y="113" text-anchor="middle" font-size="11" fill="#bfdbfe">메인 · API키 설정 · PDF 업로드 · 분석</text>

  <!-- 화살표: index → 각 리포트 -->
  <line x1="450" y1="124" x2="450" y2="148" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LocalStorage 중심 박스 -->
  <rect x="340" y="148" width="220" height="36" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="163" text-anchor="middle" class="label" font-size="12" fill="#334155">LocalStorage</text>
  <text x="450" y="178" text-anchor="middle" class="desc">election_data (candidates, district, date)</text>

  <!-- 화살표들: LocalStorage → report pages -->
  <!-- 왼쪽 그룹 -->
  <line x1="340" y1="166" x2="270" y2="166" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="270" y1="166" x2="270" y2="236" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <line x1="340" y1="166" x2="150" y2="166" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="150" y1="166" x2="150" y2="236" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 오른쪽 그룹 -->
  <line x1="560" y1="166" x2="630" y2="166" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="630" y1="166" x2="630" y2="236" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <line x1="560" y1="166" x2="750" y2="166" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="750" y1="166" x2="750" y2="236" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 아래 두 개 -->
  <line x1="450" y1="184" x2="450" y2="236" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="450" y1="184" x2="450" y2="400" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== 리포트 페이지 박스들 (상단 행) ===== -->
  <!-- report_compare.html -->
  <rect x="60" y="236" width="180" height="64" rx="8" fill="#8b5cf6"/>
  <text x="150" y="256" text-anchor="middle" class="label-white">report_compare.html</text>
  <text x="150" y="272" text-anchor="middle" font-size="11" fill="#ede9fe">01. 종합 비교분석</text>
  <text x="150" y="287" text-anchor="middle" font-size="10" fill="#ddd6fe">레이더차트 · 순위표</text>

  <!-- report_scores.html -->
  <rect x="260" y="236" width="180" height="64" rx="8" fill="#0ea5e9"/>
  <text x="350" y="256" text-anchor="middle" class="label-white">report_scores.html</text>
  <text x="350" y="272" text-anchor="middle" font-size="11" fill="#e0f2fe">02. 상세 점수 분석</text>
  <text x="350" y="287" text-anchor="middle" font-size="10" fill="#bae6fd">히트맵 · 막대그래프</text>

  <!-- report_profiles.html -->
  <rect x="460" y="236" width="180" height="64" rx="8" fill="#10b981"/>
  <text x="550" y="256" text-anchor="middle" class="label-white">report_profiles.html</text>
  <text x="550" y="272" text-anchor="middle" font-size="11" fill="#d1fae5">03. 후보별 프로파일</text>
  <text x="550" y="287" text-anchor="middle" font-size="10" fill="#a7f3d0">프로파일 카드</text>

  <!-- report_gaps.html -->
  <rect x="660" y="236" width="180" height="64" rx="8" fill="#f59e0b"/>
  <text x="750" y="256" text-anchor="middle" class="label-white">report_gaps.html</text>
  <text x="750" y="272" text-anchor="middle" font-size="11" fill="#fef3c7">04. 격차 분석</text>
  <text x="750" y="287" text-anchor="middle" font-size="10" fill="#fde68a">1위 대비 격차</text>

  <!-- ===== 리포트 페이지 박스들 (하단 행) ===== -->
  <!-- report_ai.html -->
  <rect x="160" y="336" width="180" height="64" rx="8" fill="#ec4899"/>
  <text x="250" y="356" text-anchor="middle" class="label-white">report_ai.html</text>
  <text x="250" y="372" text-anchor="middle" font-size="11" fill="#fce7f3">05. AI 모델별 비교</text>
  <text x="250" y="387" text-anchor="middle" font-size="10" fill="#fbcfe8">Claude·GPT·Gemini·Grok</text>

  <!-- report_strategy.html -->
  <rect x="360" y="336" width="180" height="64" rx="8" fill="#6366f1"/>
  <text x="450" y="356" text-anchor="middle" class="label-white">report_strategy.html</text>
  <text x="450" y="372" text-anchor="middle" font-size="11" fill="#e0e7ff">06. 선거 전략 분석</text>
  <text x="450" y="387" text-anchor="middle" font-size="10" fill="#c7d2fe">전략 리포트</text>

  <!-- report_landscape.html -->
  <rect x="560" y="336" width="180" height="64" rx="8" fill="#14b8a6"/>
  <text x="650" y="356" text-anchor="middle" class="label-white">report_landscape.html</text>
  <text x="650" y="372" text-anchor="middle" font-size="11" fill="#ccfbf1">07. 선거 지형 분석</text>
  <text x="650" y="387" text-anchor="middle" font-size="10" fill="#99f6e4">지역별 지형 리포트</text>

  <!-- 하단 행 화살표 -->
  <line x1="150" y1="300" x2="150" y2="320" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="150" y1="320" x2="250" y2="320" stroke="#94a3b8" stroke-width="1"/>
  <line x1="250" y1="320" x2="250" y2="336" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <line x1="450" y1="300" x2="450" y2="336" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <line x1="750" y1="300" x2="750" y2="320" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="750" y1="320" x2="650" y2="320" stroke="#94a3b8" stroke-width="1"/>
  <line x1="650" y1="320" x2="650" y2="336" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== 공유 리소스 ===== -->
  <rect x="80" y="452" width="740" height="2" fill="#e2e8f0"/>
  <text x="450" y="478" text-anchor="middle" font-size="12" fill="#94a3b8">공유 리소스</text>

  <!-- js/shared.js -->
  <rect x="100" y="490" width="200" height="58" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="200" y="512" text-anchor="middle" font-size="13" fill="#1e40af" font-weight="bold">js/shared.js</text>
  <text x="200" y="528" text-anchor="middle" class="desc">LocalStorage 읽기/쓰기</text>
  <text x="200" y="542" text-anchor="middle" class="desc">내비게이션 · 색상 유틸</text>

  <!-- css/style.css -->
  <rect x="350" y="490" width="200" height="58" rx="8" fill="#f1f5f9" stroke="#10b981" stroke-width="1.5"/>
  <text x="450" y="512" text-anchor="middle" font-size="13" fill="#065f46" font-weight="bold">css/style.css</text>
  <text x="450" y="528" text-anchor="middle" class="desc">공유 스타일시트</text>
  <text x="450" y="542" text-anchor="middle" class="desc">레이아웃 · 테마</text>

  <!-- 외부 CDN -->
  <rect x="600" y="490" width="200" height="58" rx="8" fill="#f1f5f9" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="700" y="512" text-anchor="middle" font-size="13" fill="#92400e" font-weight="bold">외부 CDN</text>
  <text x="700" y="528" text-anchor="middle" class="desc">Chart.js · PDF.js</text>
  <text x="700" y="542" text-anchor="middle" class="desc">Anthropic API (Claude Haiku)</text>

  <!-- 기술 스택 범례 -->
  <rect x="80" y="578" width="740" height="114" rx="10" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="450" y="600" text-anchor="middle" font-size="12" fill="#64748b" font-weight="bold">데이터 흐름</text>

  <!-- 범례 아이콘들 -->
  <rect x="100" y="614" width="12" height="12" rx="2" fill="#3b82f6"/>
  <text x="118" y="625" class="desc" font-size="12">사용자가 index.html에서 PDF를 업로드하면</text>

  <rect x="100" y="634" width="12" height="12" rx="2" fill="#8b5cf6"/>
  <text x="118" y="645" class="desc" font-size="12">Anthropic API (Claude Haiku)가 PDF를 분석하여 10개 지표 점수 생성</text>

  <rect x="100" y="654" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="118" y="665" class="desc" font-size="12">결과를 election_data 키로 LocalStorage에 저장</text>

  <rect x="100" y="674" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="118" y="685" class="desc" font-size="12">각 report_*.html 페이지가 LocalStorage에서 데이터를 읽어 차트·표 렌더링</text>
</svg>
